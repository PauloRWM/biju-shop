services:

  wp_db:
    image: mariadb:11
    container_name: wp_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  wp_app:
    image: wordpress:latest
    container_name: wp_app
    restart: unless-stopped
    depends_on:
      wp_db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: wp_db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_DISPLAY', false);
        define('WP_DEBUG_LOG', true);
        @ini_set('display_errors', 0);
        define('WP_MEMORY_LIMIT', '512M');
        define('WP_MAX_MEMORY_LIMIT', '512M');
    volumes:
      # Plugin montado direto — alterações refletem instantaneamente
      - ./wordpress-plugin/biju-shop-connector:/var/www/html/wp-content/plugins/biju-shop-connector
      # Pasta de backups acessível pelo Windows Explorer em .\wp-backups\
      - ./wp-backups:/var/www/html/wp-content/ai1wm-backups
      # PHP com memória aumentada para 512M
      - ./php-custom.ini:/usr/local/etc/php/conf.d/custom.ini
      # Persiste WordPress (temas, uploads, etc.)
      - wp_data:/var/www/html
    networks:
      - wp-net

  wp_pma:
    image: phpmyadmin:latest
    container_name: wp_pma
    restart: unless-stopped
    depends_on:
      - wp_db
    ports:
      - "8181:80"
    environment:
      PMA_HOST: wp_db
      PMA_USER: wordpress
      PMA_PASSWORD: wordpress
    networks:
      - wp-net

  # WP-CLI: instala WooCommerce + ativa plugin automaticamente, depois encerra
  wpcli:
    image: wordpress:cli
    container_name: wp_cli
    depends_on:
      - wp_db
      - wp_app
    user: "33:33"
    volumes:
      - wp_data:/var/www/html
      - ./wordpress-plugin/biju-shop-connector:/var/www/html/wp-content/plugins/biju-shop-connector
    networks:
      - wp-net
    entrypoint: >
      sh -c '
        echo "Aguardando WordPress ficar pronto...";
        until wp core is-installed --path=/var/www/html --allow-root 2>/dev/null; do
          sleep 3;
        done;
        echo "WordPress pronto!";

        wp plugin install woocommerce --activate --path=/var/www/html --allow-root;
        wp plugin activate biju-shop-connector --path=/var/www/html --allow-root;

        wp option update biju_frontend_url "http://localhost:5173" --path=/var/www/html --allow-root;

        echo "";
        echo "=== Setup concluido! ===";
        echo "WordPress:   http://localhost:8080";
        echo "WP Admin:    http://localhost:8080/wp-admin  |  admin / admin";
        echo "phpMyAdmin:  http://localhost:8181";
        echo "API Plugin:  http://localhost:8080/wp-json/biju/v1/products";
      '

volumes:
  db_data:
  wp_data:

networks:
  wp-net:
    driver: bridge
